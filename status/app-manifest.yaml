id: vdapp33-personal-academy
name: Nexus
summary: Browse-first multi-subject academy for curiosity-driven learning across politics, commercial property management, physics, quantum-science, energy-systems, aerospace, robotics, and rocket science, with live role/topic routes, optional secondary guidance, truth stacks, and signal digests.
owner: unassigned
phase: delivery
release_stage: internal-beta
last_audited: 2026-04-06

audience:
  primary: Curious learners pursuing structured depth across personal interest subjects.
  secondary: Self-directed explorers who want one shell instead of scattered standalone academies.

product:
  category: academy
  deployment_target: web
  business_model: internal-product
  status_truth: "Shell implemented. The app is browse-first, all core subject and topic routes are live, role/topic routes are live, optional secondary guidance remains available through /setup and /my-path, and curated source/signal surfaces now sit alongside the curriculum shell."

surfaces:
  primary_routes:
    - /
    - /setup
    - /my-path
    - /subjects
    - /roles
    - /topics
    - /signals
    - /[subject]
    - /[subject]/blueprint
    - /[subject]/modules
    - /[subject]/projects
    - /[subject]/tools
    - /[subject]/toolkit
    - /[subject]/day-in-the-life
    - /[subject]/sources
    - /[subject]/signals
    - /roles/[slug]
    - /roles/[slug]/sources
    - /roles/[slug]/signals
    - /topics/[slug]
    - /topics/[slug]/sources
    - /topics/[slug]/signals
  secondary_routes:
    - /[subject]/modules/[slug]
    - /[subject]/modules/[slug]/[lessonSlug]
    - /[subject]/projects/[slug]
    - /[subject]/tools/[slug]
    - /roles/[slug]/modules/[moduleSlug]
    - /roles/[slug]/modules/[moduleSlug]/[lessonSlug]
    - /roles/[slug]/projects/[projectSlug]
    - /roles/[slug]/tools/[toolSlug]
    - /topics/[slug]/projects/[projectSlug]
    - /topics/[slug]/tools/[toolSlug]

tech:
  framework: Next.js 15
  package_manager: npm
  runtime: node
  repo_shape: single-package

operations:
  local_doctrine: CLAUDE.md
  readme: README.md
  docs_dir: docs
  status_dir: status

notes:
  - Subject discovery is manifest-driven from content/curriculum/{subject}/manifest.json.
  - Progress persists locally under the `nexus-progress` key, with fallback migration from `personal-academy-progress`.
  - Guidance state persists locally under the `nexus-state` key, with fallback migration from `personal-academy-state`.
  - Founder-only route concepts are intentionally excluded from this app.
  - Quantum Science and Aerospace now extend beyond their original migration baselines with authored Nexus content.
  - Energy Systems is now a canonical subject rather than a topic-level surface.
  - Robotics is a native Nexus subject with full route coverage.
  - Commercial Property Management was migrated from vdapp46 with generic subject framing preserved at the shell level while factual vendor references remain in content where relevant.
  - Roles and topics now live under content/roles/ and content/topics/ as entity-aware route families, not just content packs.
  - The taxonomy now extends well beyond the original seven-subject shell to include additional sciences, engineering, society, markets, life, humanities, and mind subjects/topics.
  - Curated onboarding questions, path archetypes, truth stacks, and signal digests now live under content/onboarding, content/guidance, content/sources, and content/signals.
