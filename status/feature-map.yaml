app_id: vdapp33-personal-academy
last_updated: 2026-04-05

surfaces:
  - route: /
    feature: Exploration dashboard
    status: live
    notes: Exploration dashboard with subject, topic, and role discovery plus a persistent My Path entry point.

  - route: /setup
    feature: Soft onboarding
    status: live
    notes: Curated multi-step setup flow that scores archetypes and generates three path variants.

  - route: /my-path
    feature: Guided dashboard
    status: live
    notes: Shows the active blueprint, learning mode, next-best actions, today session, weekly cadence, truth-stack preview, signal preview, and review prompts.

  - route: /subjects
    feature: Subject directory
    status: live
    notes: Directory view for canonical academy subjects.

  - route: /roles
    feature: Role directory
    status: live
    notes: Directory view for embodied synthesis tracks such as Astronaut and Diplomat.

  - route: /topics
    feature: Topic directory
    status: live
    notes: Directory view for cross-disciplinary curiosity layers such as AI, Energy, Investing, and Consciousness.

  - route: /signals
    feature: Signals hub
    status: live
    notes: Curated signal hub that highlights the current path and all available subject, role, and topic digests.

  - route: /[subject]
    feature: Start Here subject landing
    status: live
    notes: Learning-first subject overview with an embedded guide rail, truth-stack preview, signal preview, and next-best-action support.

  - route: /[subject]/blueprint
    feature: Generated blueprint
    status: live
    notes: Builds the subject map from migrated module ordering and level metadata.

  - route: /[subject]/modules
    feature: Modules and lessons
    status: live
    notes: Structured curriculum with subject-aware progress and lesson knowledge checks.

  - route: /[subject]/projects
    feature: Project library
    status: live
    notes: Hands-on work where source content includes projects.

  - route: /[subject]/tools
    feature: Tool explorer
    status: live
    notes: Subject-specific tools grouped by category with richer detail pages.

  - route: /[subject]/toolkit
    feature: Framework library
    status: live
    notes: Expandable framework cards for subjects that include framework content.

  - route: /[subject]/day-in-the-life
    feature: Applied role explorer
    status: live
    notes: Client-side viewer for role snapshots and sample schedules when present.

  - route: /[subject]/sources
    feature: Subject truth stack
    status: live
    notes: Curated hierarchy of first principles, authorities, interpreters, practitioners, media, and frontier watchlists.

  - route: /[subject]/signals
    feature: Subject signals
    status: live
    notes: Curated developments, companies, institutions, people, and debates tied to the subject.

  - route: /roles/[slug]
    feature: Role landing
    status: live
    notes: Role-specific landing page with training, practical sections, cross-links, and guide rail support.

  - route: /roles/[slug]/sources
    feature: Role truth stack
    status: live
    notes: Curated credibility map for each live role.

  - route: /roles/[slug]/signals
    feature: Role signals
    status: live
    notes: Curated role-specific signal digest.

  - route: /topics/[slug]
    feature: Topic landing
    status: live
    notes: Topic-specific landing page with concept stack, applications, tools, and guide rail support.

  - route: /topics/[slug]/sources
    feature: Topic truth stack
    status: live
    notes: Curated source hierarchy for each live topic.

  - route: /topics/[slug]/signals
    feature: Topic signals
    status: live
    notes: Curated topic-specific signal digest.

supporting_capabilities:
  - name: Manifest-driven subject discovery
    status: live
    notes: Subjects are registered by manifest.json and rendered without hardcoded lists.

  - name: Subject-scoped progress store
    status: live
    notes: Completion state is namespaced per subject in one local persistence key.

  - name: Local-first academy state
    status: live
    notes: Setup answers, blueprint, learning mode, and reviews persist in a dedicated academy state store.

  - name: Honest empty states
    status: live
    notes: Empty states still protect partially populated sections, but the major subject surfaces are now content-backed across all seven subjects.

  - name: Subject coverage
    status: live
    notes: Politics, Physics, Rocket Science, Aerospace, Quantum, and Commercial Property Management all have meaningful migrated depth inside the shared shell, while Robotics is a native Nexus subject with equivalent route coverage.

  - name: Entity-aware navigation layer
    status: live
    notes: The navigation helper resolves subject, role, and topic kinds from path context and exposes sources/signals alongside the primary curriculum sections.

  - name: Deterministic blueprint generation
    status: live
    notes: Onboarding answers map to archetypes, path options, and path assignments without backend or chatbot dependency.

  - name: Next-best-action engine
    status: live
    notes: Recommendation order is deterministic across guided, explorer, and operator modes.

  - name: Curated truth stacks and signals
    status: live
    notes: Source packs and signal digests now provide credibility and world-context surfaces across subjects, roles, and topics.
