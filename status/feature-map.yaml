app_id: vdapp33-personal-academy
last_updated: 2026-04-15

surfaces:
  - route: /
    feature: Exploration dashboard
    status: live
    notes: Browse-first exploration dashboard with stronger contrast, a connected hierarchy explainer, high-level filters, macro-bucket discovery, and a more search-first orientation; My Path remains available but secondary.

  - route: /setup
    feature: Soft onboarding
    status: live
    notes: Curated multi-step setup flow that can generate a personal blueprint, but it is no longer the homepage story.

  - route: /my-path
    feature: Guided dashboard
    status: live
    notes: Secondary guided dashboard kept for users who want structured next actions, weekly cadence, truth-stack preview, signal preview, and review prompts.

  - route: /subjects
    feature: Subject directory
    status: live
    notes: Directory view for canonical academy subjects with high-level filters, browse macro buckets, denser cards, emoji-assisted scan cues, and stronger mobile contrast.

  - route: /roles
    feature: Role directory
    status: live
    notes: Directory view for embodied synthesis tracks such as Astronaut and Diplomat, grouped by browse macro buckets with high-level filters and denser scan-first cards.

  - route: /topics
    feature: Topic directory
    status: live
    notes: Directory view for cross-disciplinary curiosity layers such as AI, Investing, Economics, Health, Communication, and Consciousness, grouped by browse macro buckets with high-level filters and denser cards.

  - route: /signals
    feature: Signals hub
    status: live
    notes: Curated signal hub that highlights the current focus and all available subject, role, and topic digests.

  - route: /[subject]
    feature: Start Here subject landing
    status: live
    notes: Browse-first subject overview with an embedded guide rail, truth-stack preview, signal preview, optional next-best-action support, and shared back navigation on nested routes. Politics is a special flagship subject-world and lands directly on its richer systems surface.

  - route: /[subject]/blueprint
    feature: Generated blueprint
    status: live
    notes: Builds the subject map from module ordering and level metadata, but the route is secondary to direct browsing.

  - route: /[subject]/modules
    feature: Modules and lessons
    status: live
    notes: Structured curriculum with subject-aware progress, lesson knowledge checks, and route-level back navigation that remains visible on mobile.

  - route: /[subject]/projects
    feature: Project library
    status: live
    notes: Hands-on work where source content includes projects.

  - route: /[subject]/tools
    feature: Tool explorer
    status: live
    notes: Subject-specific tools grouped by category with richer detail pages.

  - route: /[subject]/toolkit
    feature: Framework library
    status: live
    notes: Expandable framework cards for subjects that include framework content.

  - route: /[subject]/day-in-the-life
    feature: Applied role explorer
    status: live
    notes: Client-side viewer for role snapshots and sample schedules when present, with shared back navigation for nested detail movement.

  - route: /[subject]/sources
    feature: Subject truth stack
    status: live
    notes: Curated hierarchy of first principles, authorities, interpreters, practitioners, media, and frontier watchlists for the expanded taxonomy.

  - route: /[subject]/signals
    feature: Subject signals
    status: live
    notes: Curated developments, companies, institutions, people, and debates tied to the subject.

  - route: /roles/[slug]
    feature: Role landing
    status: live
    notes: Role-specific landing page with training, practical sections, cross-links, guide rail support, and shared back navigation on nested role routes.

  - route: /roles/[slug]/sources
    feature: Role truth stack
    status: live
    notes: Curated credibility map for each live role.

  - route: /roles/[slug]/signals
    feature: Role signals
    status: live
    notes: Curated role-specific signal digest.

  - route: /topics/[slug]
    feature: Topic landing
    status: live
    notes: Topic-specific landing page with concept stack, applications, tools, guide rail support, and shared back navigation on nested topic routes.

  - route: /topics/[slug]/sources
    feature: Topic truth stack
    status: live
    notes: Curated source hierarchy for each live topic.

  - route: /topics/[slug]/signals
    feature: Topic signals
    status: live
    notes: Curated topic-specific signal digest.

supporting_capabilities:
  - name: Manifest-driven subject discovery
    status: live
    notes: Subjects are registered by manifest.json and rendered without hardcoded lists, now including quantum-science, energy-systems, and a much broader taxonomy.

  - name: Subject-scoped progress store
    status: live
    notes: Completion state is namespaced per subject in one local persistence key.

  - name: Local-first academy state
    status: live
    notes: Setup answers, blueprint, learning mode, and reviews persist in a dedicated academy state store.

  - name: Honest empty states
    status: live
    notes: Empty states still protect partially populated sections, but the major subject surfaces are now content-backed across the browse-first taxonomy.

  - name: Subject coverage
    status: live
    notes: Politics, Physics, Rocket Science, Aerospace, Quantum Science, Energy Systems, and Commercial Property Management all have meaningful depth inside the shared shell, while Robotics is a native Nexus subject with equivalent route coverage.

  - name: Entity-aware navigation layer
    status: live
    notes: The navigation helper resolves subject, role, and topic kinds from path context and exposes sources/signals alongside the primary curriculum sections.

  - name: Command palette quick jump
    status: live
    notes: Local static search indexes subjects, topics, roles, flagship modules, and signals, and is now available from both desktop and mobile navigation.

  - name: High-level filter rail
    status: live
    notes: Science, Technology, Society, Business, Human, Culture, and Future provide a user-facing orientation layer above macro buckets on the homepage and browse directories.

  - name: Macro-bucket browse model
    status: live
    notes: Discovery is now layered above technical groups using Reality, Human Being, Civilization, Built World, Markets & Assets, Meaning & Culture, and Frontier buckets.

  - name: Shared back navigation
    status: live
    notes: Nested subject, topic, and role pages now inherit a route-aware back affordance instead of relying on breadcrumbs alone.

  - name: Guided-world role surfaces
    status: live
    notes: Astronaut is the reference implementation and the other flagship roles now follow the same structured, readable role-world contract.

  - name: Emoji-assisted browse scanning
    status: live
    notes: Subjects, topics, and roles now support curated emoji metadata alongside the icon system to make dense catalogs easier to scan quickly.

  - name: Cloud visual teaching stack
    status: live
    notes: Cloud now teaches through a staged visual system: general cloud concepts, cross-provider comparison, AWS deepening, and customer-vs-provider responsibility maps.

  - name: Deterministic blueprint generation
    status: live
    notes: Onboarding answers map to archetypes, path options, and path assignments without backend or chatbot dependency.

  - name: Next-best-action engine
    status: live
    notes: Recommendation order is deterministic across guided, explorer, and operator modes.

  - name: Curated truth stacks and signals
    status: live
    notes: Source packs and signal digests now provide credibility and world-context surfaces across subjects, roles, and topics.
